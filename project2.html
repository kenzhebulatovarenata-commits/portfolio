<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <title>Experimental Notation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="nav-left">
        <a href="works.html">Назад</a>
    </div>

    <div class="nav-right">
        <a href="contact.html">Связаться со мной</a>
    </div>
</header>
<section class="exp-section">
  <div class="exp-sticky">
    
    <h1 class="exp-title">
      EXPERIMENTAL<br>NOTATION
    </h1>

    <div class="exp-cards">
      <div class="exp-card exp-card--1"><img src="notation/nposter.png"></div>
      <div class="exp-card exp-card--2"><img src="notation/nposter1.png"></div>
      <div class="exp-card exp-card--3"><img src="notation/nposter2.png"></div>
      <div class="exp-card exp-card--4"><img src="notation/nposter3.png"></div>
    </div>

  </div>
</section>
<script>
const section = document.querySelector('.exp-section');
const cards = document.querySelectorAll('.exp-card');

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function animate(progress) {
  progress = Math.max(0, Math.min(1, progress));

  cards.forEach((card, i) => {
    let x = 0;
    let y = 0;
    let r = 0;

    switch(i) {
      case 0:
        x = lerp(-400, 0, progress);
        y = lerp(-250, 0, progress);
        r = lerp(-40, 0, progress);
        break;

      case 1:
        x = lerp(400, 0, progress);
        y = lerp(-250, 0, progress);
        r = lerp(40, 0, progress);
        break;

      case 2:
        x = lerp(-400, 0, progress);
        y = lerp(250, 0, progress);
        r = lerp(25, 0, progress);
        break;

      case 3:
        x = lerp(400, 0, progress);
        y = lerp(250, 0, progress);
        r = lerp(-25, 0, progress);
        break;
    }

    const scale = lerp(0.6, 1, progress);
    const opacity = progress;

    card.style.transform = `
      translate(${x}px, ${y}px)
      rotate(${r}deg)
      scale(${scale})
    `;

    card.style.opacity = opacity;
  });
}

function onScroll() {
  const rect = section.getBoundingClientRect();
  const windowH = window.innerHeight;

  const progress = (windowH - rect.top) / (windowH + rect.height);

  animate(progress);
}

window.addEventListener('scroll', onScroll);
onScroll();
</script>
</body>
</html>
