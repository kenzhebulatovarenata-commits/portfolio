<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <title>Experimental Notation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="nav-left">
        <a href="works.html">Назад</a>
    </div>

    <div class="nav-right">
        <a href="contact.html">Связаться со мной</a>
    </div>
</header>
<section class="exp-section">
  <div class="exp-sticky">
    
    <h1 class="exp-title">
      EXPERIMENTAL<br>NOTATION
    </h1>

    <div class="exp-cards">
      <div class="exp-card exp-card--1"><img src="notation/nposter.png"></div>
      <div class="exp-card exp-card--2"><img src="notation/nposter1.png"></div>
      <div class="exp-card exp-card--3"><img src="notation/nposter2.png"></div>
      <div class="exp-card exp-card--4"><img src="notation/nposter3.png"></div>
    </div>

  </div>
</section>
<script>
const section = document.querySelector('.exp-section');
const cards = document.querySelectorAll('.exp-card');
const title = document.querySelector('.exp-title');

function clamp(v) {
  return Math.max(0, Math.min(1, v));
}

function animate(progress) {
  progress = clamp(progress);

  // ===== ДВИЖЕНИЕ ЗАГОЛОВКА =====
  const titleY = (1 - progress) * 300;   // снизу вверх
  const titleX = (1 - progress) * -150;  // слева → центр

  title.style.transform = `
    translate(${titleX}px, ${titleY}px)
  `;

  // ===== КАРТОЧКИ =====
  const radius = 400; // радиус дуги

  cards.forEach((card, i) => {

    // смещение по времени (чтобы шли "змейкой")
    const delay = i * 0.08;
    let t = clamp((progress - delay) / (1 - delay));

    // угол: от верхней точки → вниз справа
    const startAngle = -Math.PI / 2; // сверху
    const endAngle = Math.PI / 4;    // вниз справа

    const angle = startAngle + (endAngle - startAngle) * t;

    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;

    // финальная позиция (линия по центру)
    const finalX = (i - 1.5) * 220;
    const finalY = 0;

    // смешиваем дугу → в линию
    const mix = clamp((progress - 0.6) / 0.4);

    const posX = x * (1 - mix) + finalX * mix;
    const posY = y * (1 - mix) + finalY * mix;

    // вращение: перевернутые → ровные
    const rotate = (1 - t) * 180;

    // масштаб
    const scale = 0.7 + t * 0.3;

    card.style.transform = `
      translate(${posX}px, ${posY}px)
      rotate(${rotate}deg)
      scale(${scale})
    `;

    card.style.opacity = t;
  });
}

function onScroll() {
  const rect = section.getBoundingClientRect();
  const windowH = window.innerHeight;

  const progress = (windowH - rect.top) / (windowH + rect.height);

  animate(progress);
}

window.addEventListener('scroll', onScroll);
onScroll();
</script>
</body>
</html>
