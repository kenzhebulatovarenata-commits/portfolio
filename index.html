<!-- ТЕКСТ ВНИЗУ -->
<section class="hero">
    <h1>ПРИВЕТ, МЕНЯ<br><span class="indent">ЗОВУТ РЕНАТА!</span></h1>
</section>

<div class="scroll-spacer"></div>
    <div style="height: 150vh;"></div>

<script>
const cards = document.querySelectorAll('.card');
const header = document.querySelector('.header');

let activeIndex = 2;
let targetIndex = 2;

/* scroll progress */
let scrollProgress = 0;
let targetScroll = 0;

function lerp(a, b, t) {
    return a + (b - a) * t;
}

/* =========================
   CLICK
========================= */
cards.forEach((card, i) => {
    card.addEventListener('click', (e) => {

        if (i !== Math.round(activeIndex)) {
            e.preventDefault();
            targetIndex = i;
            return;
        }

        const link = card.getAttribute('href');
        if (link) window.location.href = link;
    });
});

/* =========================
   TRACKPAD / WHEEL CONTROL (УЛУЧШЕНО)
========================= */

let wheelDelta = 0;
let wheelCooldown = false;

window.addEventListener('wheel', (e) => {

    const isHorizontal = Math.abs(e.deltaX) > Math.abs(e.deltaY);

    if (!isHorizontal) return;
    if (wheelCooldown) return;

    // копим движение (ВАЖНО)
    wheelDelta += e.deltaX;

    const threshold = 50; // чувствительность (можешь менять)

    if (Math.abs(wheelDelta) > threshold) {

        wheelCooldown = true;

        if (wheelDelta > 0) {
            targetIndex = Math.min(cards.length - 1, targetIndex + 1);
        } else {
            targetIndex = Math.max(0, targetIndex - 1);
        }

        wheelDelta = 0;

        setTimeout(() => {
            wheelCooldown = false;
        }, 400);
    }
});

/* =========================
   SCROLL TRACKER
========================= */
window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    const maxScroll = window.innerHeight * 1.7;

    targetScroll = Math.min(scrollY / maxScroll, 1);
});

/* =========================
   ANIMATION LOOP (RAF)
========================= */
function animate() {

    scrollProgress = lerp(scrollProgress, targetScroll, 0.08);
    activeIndex = lerp(activeIndex, targetIndex, 0.08);

    const p = scrollProgress;

    header.style.transform = `translateY(${lerp(0, -120, p)}px)`;

    const spacing = 240;

    cards.forEach((card, i) => {

        const offset = i - activeIndex;
        const abs = Math.abs(offset);
        const distance = Math.abs(offset);

        const x = offset * spacing;
        const y = lerp(-60, 0, p);

        const exitProgress = Math.min(1, Math.max(0, (p - 0.8) / 0.2));
        const exit = lerp(0, -window.innerHeight * 1.2, exitProgress);

        /* SCALE (градиент) */
        const scale = lerp(1.7, 0.9, Math.min(distance / 2, 1));

        /* Z DEPTH (градиент) */
        const z = lerp(260, -120, Math.min(distance / 2, 1));

        card.style.zIndex = 100 - abs;

        card.style.transform = `
            translateX(${x}px)
            translateY(${y + exit}px)
            translateZ(${z}px)
            scale(${scale})
        `;
    });

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
