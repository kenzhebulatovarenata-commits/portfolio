<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renata</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="nav-left">
        <a href="#">Работы</a>
        <a href="#">Обо мне</a>
    </div>
    <div class="nav-right">
        <a href="#">Связаться со мной</a>
    </div>
</header>

<section class="scroll-stage">
    <section class="gallery">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </section>
</section>
    
<section class="hero">
    <h1>
    ПРИВЕТ, МЕНЯ<br>
    <span class="indent">ЗОВУТ РЕНАТА!</span>
</h1>
</section>
<script>
const cards = document.querySelectorAll('.card');
const header = document.querySelector('.header');

function lerp(a, b, t) {
    return a + (b - a) * t;
}

function update() {
    const scrollY = window.scrollY;
    const maxScroll = window.innerHeight; // одна “сцена”
    let p = Math.min(scrollY / maxScroll, 1);

    // header уезжает вверх
    header.style.transform = `translateY(${lerp(0, -120, p)}px)`;

    const centerIndex = 2; // средняя точка (из 5)

   cards.forEach((card, i) => {
    const center = 2;
    const offset = i - center;

    const baseSpacing = 240;
    const baseX = offset * baseSpacing;

    // прогресс скролла
    const pLocal = p;

    // Z-глубина: центр ближе, края дальше
    let z = 0;

    if (offset === 0) {
        z = lerp(0, 250, p); // выезжает вперёд
    } else if (Math.abs(offset) === 1) {
        z = lerp(0, 120, p); // немного ближе
    } else {
        z = lerp(0, -300, p); // уходит в глубину
    }

    // масштаб как дополнительный слой ощущения
    let scale = 1;

    if (offset === 0) scale = lerp(1, 2.1, p);
    else if (Math.abs(offset) === 1) scale = lerp(1, 1.6, p);
    else scale = lerp(1, 0.85, p);

    // боковой сдвиг крайних
    let xShift = 0;

    if (i === 0) xShift = lerp(0, -500, p);
    if (i === 4) xShift = lerp(0, 500, p);

    // z-index чтобы центр всегда сверху
    const zIndex = 10 - Math.abs(offset);

    card.style.zIndex = zIndex;

    card.style.transform = `
        translateX(${baseX + xShift}px)
        translateZ(${z}px)
        scale(${scale})
    `;
});
}

window.addEventListener('scroll', update);
update();
</script>
</body>
</html>
