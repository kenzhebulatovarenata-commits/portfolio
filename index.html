<section class="hero">
    <h1>ПРИВЕТ, МЕНЯ<br><span class="indent">ЗОВУТ РЕНАТА!</span></h1>
</section>

<div class="scroll-spacer"></div>
    <div style="height: 150vh;"></div>

<script>
const cards = document.querySelectorAll('.card');
const header = document.querySelector('.header');

let activeIndex = 2;
let targetIndex = 2;

/* scroll progress */
let scrollProgress = 0;
let targetScroll = 0;

function lerp(a, b, t) {
    return a + (b - a) * t;
}

/* =========================
   CLICK
========================= */
cards.forEach((card, i) => {
    card.addEventListener('click', (e) => {

        if (i !== Math.round(activeIndex)) {
            e.preventDefault();
            targetIndex = i;
            return;
        }

        const link = card.getAttribute('href');
        if (link) window.location.href = link;
    });
});

/* =========================
   SCROLL TRACKER
========================= */
window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    const maxScroll = window.innerHeight * 1.7;

    targetScroll = Math.min(scrollY / maxScroll, 1);
});

/* =========================
   ANIMATION LOOP (RAF)
========================= */
function animate() {

    /* smooth scroll */
    scrollProgress = lerp(scrollProgress, targetScroll, 0.08);

    /* smooth center change */
    activeIndex = lerp(activeIndex, targetIndex, 0.08);

    const p = scrollProgress;

    header.style.transform = `translateY(${lerp(0, -120, p)}px)`;

    const spacing = 240;

    cards.forEach((card, i) => {

        const offset = i - activeIndex;
        const abs = Math.abs(offset);

        const x = offset * spacing;
        const y = lerp(-60, 0, p);

        const exitProgress = Math.min(1, Math.max(0, (p - 0.8) / 0.2));
        const exit = lerp(0, -window.innerHeight * 1.2, exitProgress);

        const isCenter = Math.round(activeIndex) === i;

        let scale =
            isCenter ? 1.6 :
            abs === 1 ? 1.25 :
            1;

        let z =
            isCenter ? 250 :
            abs === 1 ? 120 :
            -120;

        card.style.zIndex = 100 - abs;

        card.style.transform = `
            translateX(${x}px)
            translateY(${y + exit}px)
            translateZ(${z}px)
            scale(${scale})
        `;
    });

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
