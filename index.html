<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renata</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="nav-left">
        <a href="#">Работы</a>
        <a href="#">Обо мне</a>
    </div>
    <div class="nav-right">
        <a href="#">Связаться со мной</a>
    </div>
</header>

<div class="scene-wrapper">
    <section class="scroll-stage">

        <section class="gallery">
            <div class="card"><img src="img/1.jpg"></div>
            <div class="card"><img src="img/2.jpg"></div>
            <div class="card"><img src="img/3.jpg"></div>
            <div class="card"><img src="img/4.jpg"></div>
            <div class="card"><img src="img/5.jpg"></div>
        </section>

        <section class="hero">
            <h1>ПРИВЕТ, МЕНЯ<br><span class="indent">ЗОВУТ РЕНАТА!</span></h1>
        </section>

    </section>
</div>

<div class="scroll-spacer"></div>
    <div style="height: 150vh;"></div>
<script>
const cards = document.querySelectorAll('.card');
const header = document.querySelector('.header');

let activeIndex = 2;

function lerp(a, b, t) {
    return a + (b - a) * t;
}

// =========================
// КЛИК — ТОЛЬКО ЦЕНТР
// =========================
cards.forEach((card, i) => {
    card.addEventListener('click', (e) => {

        if (i !== activeIndex) {
            e.preventDefault();
            return;
        }

        const link = card.getAttribute('href');
        if (link) {
            window.location.href = link;
        }
    });
});

// =========================
// RENDER
// =========================
function update() {
    const scrollY = window.scrollY;

    // анимация длится до 170vh
    const maxScroll = window.innerHeight * 1.7;
    const p = Math.min(scrollY / maxScroll, 1);

    // header уезжает вверх
    header.style.transform = `translateY(${lerp(0, -120, p)}px)`;

    const spacing = 240;

    cards.forEach((card, i) => {
        const offset = i - activeIndex;
        const abs = Math.abs(offset);

        // =========================
        // X позиция (горизонталь)
        // =========================
        const x = offset * spacing;

        // =========================
        // Y: сначала выше, потом центр
        // =========================
        const y = lerp(-80, 0, p);

        // =========================
        // SCALE
        // =========================
        let scale;
        if (offset === 0) {
            scale = lerp(1, 2.2, p);
        } else if (abs === 1) {
            scale = lerp(1, 1.5, p);
        } else {
            scale = 1.1;
        }

        // =========================
        // Z depth
        // =========================
        let z;
        if (offset === 0) {
            z = lerp(0, 250, p);
        } else if (abs === 1) {
            z = lerp(0, 120, p);
        } else {
            z = -120;
        }

        // =========================
        // opacity дальних
        // =========================
        let opacity = abs >= 2 ? 0.7 : 1;

        // =========================
        // active class (центр)
        // =========================
        if (i === activeIndex) {
            card.classList.add('center');
        } else {
            card.classList.remove('center');
        }

        // =========================
        // APPLY
        // =========================
        card.style.zIndex = 10 - abs;

        card.style.transform = `
            translateX(${x}px)
            translateY(${y}px)
            translateZ(${z}px)
            scale(${scale})
        `;

        card.style.opacity = opacity;
    });
}

// =========================
// SCROLL
// =========================
window.addEventListener('scroll', update);
update();
</script>
</body>
</html>
