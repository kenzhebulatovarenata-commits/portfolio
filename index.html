<body>

<header class="header">
    <div class="nav-left">

    <div class="nav-right">
        <a href="contact.html">Связаться со мной</a>
    </div>
</header>

<!-- СЦЕНА С КАРТОЧКАМИ (фиксированная) -->
<section class="scene">
    <div class="gallery">
        <a class="card" href="project1.html">

</a>

</a>
    </div>
</section>

<!-- ТЕКСТ ВНИЗУ -->
<section class="hero">
    <h1>ПРИВЕТ, МЕНЯ<br><span class="indent">ЗОВУТ РЕНАТА!</span></h1>
</section>

<div class="scroll-spacer"></div>
    <div style="height: 150vh;"></div>

<script>
const cards = document.querySelectorAll('.card');
const header = document.querySelector('.header');

let activeIndex = 2;

function lerp(a,b,t){return a+(b-a)*t;}

/* =========================
   КЛИК ЛОГИКА (ДОБАВЛЕНО)
========================= */
cards.forEach((card, i) => {
    card.addEventListener('click', (e) => {

        // если не центр — делаем её центральной
        if (i !== activeIndex) {
            e.preventDefault();
            activeIndex = i;
            update();
            return;
        }

        // если центр — идём в проект
        const link = card.getAttribute('href');

        if (link) {
            window.location.href = link;
        }
    });
});

/* =========================
   SCROLL АНИМАЦИЯ
========================= */
function update(){
    const scrollY = window.scrollY;
    const maxScroll = window.innerHeight * 1.7;
    const p = Math.min(scrollY / maxScroll,1);

    header.style.transform = `translateY(${lerp(0,-120,p)}px)`;

    const spacing = 240;

    cards.forEach((card,i)=>{

        const offset = i - activeIndex;
        const abs = Math.abs(offset);

        const x = offset * spacing;
        const y = lerp(-60, 0, p);

        const exitProgress = Math.min(1, Math.max(0, (p - 0.8) / 0.2));
        const exit = lerp(0, -window.innerHeight * 1.2, exitProgress);

        let scale =
            offset===0 ? lerp(1,1.6,p) :
            abs===1 ? lerp(1,1.25,p) :
            1;

        let z =
            offset===0 ? lerp(0,250,p) :
            abs===1 ? lerp(0,120,p) :
            -120;

        /* 🔥 ВАЖНО: возвращаем нормальную слоистость */
        card.style.zIndex = 100 - abs;

        /* 🔥 чтобы клики не ломались по слоям */
        card.style.pointerEvents = "auto";

        card.style.transform = `
            translateX(${x}px)
            translateY(${y + exit}px)
            translateZ(${z}px)
            scale(${scale})
        `;
    });
}

window.addEventListener('scroll',update);
update();
</script>

</body>
</html>
