<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renata</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="nav-left">
        <a href="#">Работы</a>
        <a href="#">Обо мне</a>
    </div>
    <div class="nav-right">
        <a href="#">Связаться со мной</a>
    </div>
</header>

<section class="scroll-stage">
    <section class="gallery">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </section>
</section>
    
<section class="hero">
    <h1>
    ПРИВЕТ, МЕНЯ<br>
    <span class="indent">ЗОВУТ РЕНАТА!</span>
</h1>
</section>
<script>
const cards = document.querySelectorAll('.card');
const header = document.querySelector('.header');

let activeIndex = 2;

function lerp(a, b, t) {
    return a + (b - a) * t;
}

// hover вместо клика
cards.forEach((card, i) => {
    card.addEventListener('mouseenter', () => {
        activeIndex = i;
        update();
    });
});

function update() {
    const scrollY = window.scrollY;
    const maxScroll = window.innerHeight;
    let p = Math.min(scrollY / maxScroll, 1);

    header.style.transform = `translateY(${lerp(0, -120, p)}px)`;

    const spacing = 240;

    cards.forEach((card, i) => {
        const offset = i - activeIndex;
        const abs = Math.abs(offset);

        const x = offset * spacing;

        // SCALE с заморозкой дальних
        let scale;
        if (abs >= 2) {
            scale = 1.1;
        } else {
            const targetScale =
                offset === 0 ? 2.2 :
                abs === 1 ? 1.5 : 1;

            scale = lerp(1, targetScale, p);
        }

        // Z глубина
        let z;
        if (abs >= 2) {
            z = -120;
        } else {
            z =
                offset === 0 ? lerp(0, 250, p) :
                abs === 1 ? lerp(0, 120, p) :
                0;
        }

        // opacity
        let opacity = abs >= 2 ? 0.7 : 1;

        card.style.zIndex = 10 - abs;

        card.style.transform = `
            translateX(${x}px)
            translateZ(${z}px)
            scale(${scale})
        `;

        card.style.opacity = opacity;
    });
}

window.addEventListener('scroll', update);
update();
</script>
</body>
</html>
