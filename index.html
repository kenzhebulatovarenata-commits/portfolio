</h1>

<p class="description">текст такой то</p>
    </div>

</section>

<script>
window.addEventListener("scroll", () => {
    const image = document.querySelector(".hero-right img");
    if (!image) return;

    let scrollY = window.scrollY;

   image.style.transform = `translateY(${scrollY * -0.3}px) scale(${1 - scrollY/2000})`;

    let opacity = 1 - scrollY / 500;
    image.style.opacity = opacity;
});
</script>
</body>
