<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renata</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="nav-left">
        <a href="#">Работы</a>
        <a href="#">Обо мне</a>
    </div>
    <div class="nav-right">
        <a href="#">Связаться со мной</a>
    </div>
</header>

<section class="gallery">
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
</section>

<section class="hero">
    <h1>
    ПРИВЕТ, МЕНЯ<br>
    <span class="indent">ЗОВУТ РЕНАТА!</span>
</h1>
</section>
   <script>
window.addEventListener('scroll', () => {
    const gallery = document.querySelector('.gallery');
    const cards = document.querySelectorAll('.card');

    const rect = gallery.getBoundingClientRect();
    const windowHeight = window.innerHeight;

    let progress = -rect.top / windowHeight;
    progress = Math.max(0, Math.min(1, progress));

    // масштаб от маленьких к большим
    const scale = 0.6 + progress * 1.2;

    cards.forEach((card) => {
        card.style.transform = `scale(${scale})`;
    });
});
</script>

</body>
</html>
