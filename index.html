<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renata</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="nav-left">
        <a href="works.html">Работы</a>
        <a href="about.html">Обо мне</a>
    </div>

    <div class="nav-right">
        <a href="contact.html">Связаться со мной</a>
    </div>
</header>

<!-- СЦЕНА С КАРТОЧКАМИ (фиксированная) -->
<section class="scene">
    <div class="gallery">
        <div class="card"><img src="img/1.jpg"></div>
        <div class="card"><img src="img/2.jpg"></div>
        <div class="card"><img src="img/3.jpg"></div>
        <div class="card"><img src="img/4.jpg"></div>
        <div class="card"><img src="img/5.jpg"></div>
    </div>
</section>

<!-- ТЕКСТ ВНИЗУ -->
<section class="hero">
    <h1>ПРИВЕТ, МЕНЯ<br><span class="indent">ЗОВУТ РЕНАТА!</span></h1>
</section>

<div class="scroll-spacer"></div>
    <div style="height: 180vh;"></div>

<script>
const cards = document.querySelectorAll('.card');
const header = document.querySelector('.header');

let activeIndex = 2;

function lerp(a,b,t){return a+(b-a)*t;}

function update(){
    const scrollY = window.scrollY;
    const maxScroll = window.innerHeight * 1.7;
    const p = Math.min(scrollY / maxScroll,1);

    header.style.transform = `translateY(${lerp(0,-120,p)}px)`;

    const spacing = 240;

    cards.forEach((card,i)=>{
        const offset = i - activeIndex;
        const abs = Math.abs(offset);

        const x = offset * spacing;
        const y = lerp(-60, 0, p);

        let scale =
            offset===0 ? lerp(1,2.2,p) :
            abs===1 ? lerp(1,1.5,p) :
            1.1;

        let z =
            offset===0 ? lerp(0,250,p) :
            abs===1 ? lerp(0,120,p) :
            -120;

        card.style.zIndex = 10 - abs;

        card.style.transform = `
            translateX(${x}px)
            translateY(${y}px)
            translateZ(${z}px)
            scale(${scale})
        `;
    });
}

window.addEventListener('scroll',update);
update();
</script>

</body>
</html>
