<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renata</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="nav-left">
        <a href="#">Работы</a>
        <a href="#">Обо мне</a>
    </div>
    <div class="nav-right">
        <a href="#">Связаться со мной</a>
    </div>
</header>

<section class="scroll-stage">
    <section class="gallery">
    <div class="card"><img src="img/1.jpg" alt=""></div>
    <div class="card"><img src="img/2.jpg" alt=""></div>
    <div class="card"><img src="img/3.jpg" alt=""></div>
    <div class="card"><img src="img/4.jpg" alt=""></div>
    <div class="card"><img src="img/5.jpg" alt=""></div>
</section>
</section>
    
<section class="hero">
    <h1>
    ПРИВЕТ, МЕНЯ<br>
    <span class="indent">ЗОВУТ РЕНАТА!</span>
</h1>
</section>
<script>
const cards = document.querySelectorAll('.card');
const header = document.querySelector('.header');

let activeIndex = 2;

function lerp(a, b, t) {
    return a + (b - a) * t;
}

// клики: любая карточка становится центром
cards.forEach((card, i) => {
    card.addEventListener('click', () => {
        activeIndex = i;
        update();
    });
});

function update() {
    const scrollY = window.scrollY;
    const maxScroll = window.innerHeight;
    let p = Math.min(scrollY / maxScroll, 1);

    // header уезжает вверх
    header.style.transform = `translateY(${lerp(0, -120, p)}px)`;

    const spacing = 240;

    cards.forEach((card, i) => {
        const offset = i - activeIndex;
        const abs = Math.abs(offset);

        // базовая позиция (строго ровная цепочка)
        const x = offset * spacing;

        // =========================
        // SCALE (с заморозкой)
        // =========================
        let scale;

        if (abs >= 2) {
            scale = 1.1; // дальние зафиксированы
        } else {
            const targetScale =
                offset === 0 ? 2.2 :
                abs === 1 ? 1.5 : 1;

            scale = lerp(1, targetScale, p);
        }

        // =========================
        // Z (глубина с заморозкой)
        // =========================
        let z;

        if (abs >= 2) {
            z = -120;
        } else {
            z =
                offset === 0 ? lerp(0, 250, p) :
                abs === 1 ? lerp(0, 120, p) :
                0;
        }

        // =========================
        // opacity (мягкое затухание дальних)
        // =========================
        let opacity = 1;
        if (abs >= 2) {
            opacity = 0.7;
        } else if (abs === 1) {
            opacity = lerp(1, 0.9, p);
        }

        // слой — центр всегда сверху
        card.style.zIndex = 10 - abs;

        // итоговый трансформ
        card.style.transform = `
            translateX(${x}px)
            translateZ(${z}px)
            scale(${scale})
        `;

        card.style.opacity = opacity;
    });
}

window.addEventListener('scroll', update);
update();
</script>
</body>
</html>
