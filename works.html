<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #fff;
    
    <header class="header">
    <div class="nav-left">
        <a href="index.html">Назад</a>
    </div>
</header>
    
}

/* ===== FULL WIDTH CARDS ===== */
.motion-list {
    display: flex;
    flex-direction: column;
    padding: 0 var(--side-padding) 80px;
}

.motion-item {
    width: 100%;
    height: 420px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
}

.motion-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s;
}

.motion-item:hover img {
    transform: scale(1.05);
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 0 var(--side-padding) 100px;
}

.grid img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    cursor: pointer;
    transition: 0.3s;
}

.grid img:hover {
    transform: scale(0.97);
}

/* ===== MODAL ===== */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.modal.active {
    display: flex;
}

.modal img {
    max-width: 90%;
    max-height: 90%;
}

/* arrows */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
    color: white;
    cursor: pointer;
    user-select: none;
    padding: 20px;
}

.arrow.left {
    left: 20px;
}

.arrow.right {
    right: 20px;
}
</style>
</head>
<body>

<!-- ===== MOTION ===== -->
<section class="about">
    <div class="about-inner">
        <h2>Моушн дизайн</h2>
    </div>
</section>

<div class="motion-list">
    <a href="project1.html" class="motion-item"><img src="img/1.jpg"></a>
    <a href="project2.html" class="motion-item"><img src="img/2.jpg"></a>
    <a href="project3.html" class="motion-item"><img src="img/3.jpg"></a>
    <a href="project4.html" class="motion-item"><img src="img/4.jpg"></a>
    <a href="project5.html" class="motion-item"><img src="img/5.jpg"></a>
</div>

<!-- ===== GRAPHIC ===== -->
<section class="about">
    <div class="about-inner">
        <h2>Графический дизайн</h2>
    </div>
</section>

<div class="grid" id="grid">
    <img src="img/1.jpg">
    <img src="img/2.jpg">
    <img src="img/3.jpg">
    <img src="img/4.jpg">
    <img src="img/5.jpg">
    <img src="img/6.jpg">
    <img src="img/7.jpg">
    <img src="img/8.jpg">
</div>

<!-- ===== MODAL ===== -->
<div class="modal" id="modal">
    <div class="arrow left" id="prev">←</div>
    <img id="modalImg">
    <div class="arrow right" id="next">→</div>
</div>

<script>
const images = document.querySelectorAll('#grid img');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

let current = 0;

/* OPEN */
images.forEach((img, i) => {
    img.addEventListener('click', () => {
        current = i;
        show();
        modal.classList.add('active');
    });
});

/* SHOW IMAGE */
function show() {
    modalImg.src = images[current].src;
}

/* CLOSE */
modal.addEventListener('click', (e) => {
    if (e.target === modal) {
        modal.classList.remove('active');
    }
});

/* NEXT */
document.getElementById('next').onclick = () => {
    current = (current + 1) % images.length;
    show();
};

/* PREV */
document.getElementById('prev').onclick = () => {
    current = (current - 1 + images.length) % images.length;
    show();
};
</script>

</body>
</html>
