<!-- ===== MODAL ===== -->
<div class="modal" id="modal">
    <div class="arrow left" id="prev">←</div>

    <div class="modal-content">
        <img id="modalImg">
        <div class="extra-images" id="extraImages"></div>
    </div>

    <div class="arrow right" id="next">→</div>
</div>

<script>
const projects = document.querySelectorAll('.project');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const extraImages = document.getElementById('extraImages');

let currentImages = [];
let currentIndex = 0;

/* OPEN PROJECT */
projects.forEach((project) => {
    project.addEventListener('click', () => {
        currentImages = project.dataset.images.split(',');
        currentIndex = 0;

        showImage();
        showExtras();

        modal.classList.add('active');
    });
});

function showExtras() {
    extraImages.innerHTML = '';

    currentImages.forEach((src, i) => {
        const img = document.createElement('img');
        img.src = src;

        img.addEventListener('click', () => {
            currentIndex = i;
            showImage();
        });

        extraImages.appendChild(img);
    });
}
    function openModal() {
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    modal.classList.remove('active');
    document.body.style.overflow = '';
}
    
function showImage() {
    modalImg.classList.remove('vertical', 'horizontal');
    modalImg.src = currentImages[currentIndex];

    modalImg.onload = () => {
        if (modalImg.naturalHeight > modalImg.naturalWidth) {
            modalImg.classList.add('vertical');
        } else {
            modalImg.classList.add('horizontal');
        }
    };
}

/* CLOSE */
modal.addEventListener('click', (e) => {
    const isImage = e.target.closest('img');
    const isArrow = e.target.closest('.arrow');
    
    if (!isImage && !isArrow) {
        modal.classList.remove('active');
    }
});

/* NEXT */
document.getElementById('next').onclick = () => {
    currentIndex = (currentIndex + 1) % currentImages.length;
    showImage();
};

/* PREV */
document.getElementById('prev').onclick = () => {
    currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
    showImage();
};
    </script>
